{{ define "registerForm" }}
<section id="form-container" class="flex flex-col bg-gray-900 text-emerald-600 rounded-lg p-4">
	<h2 class="text-xl mb-8">Register</h2>
	<form hx-post="/register" hx-target="body" hx-swap="innerHTML"
		hx-on::after-request="if(event.detail.successful) htmx.ajax('GET', '/registeredNavbar', {target:'#navbar', swap:'outerHTML'})"
		class="flex flex-col gap-4">
		<label for="email">Email</label>
		<input type="text" id="email" name="email" required placeholder="Enter your email"
			class="p-2 bg-black rounded-md text-black">

		<label for="username">Username</label>
		<input type="text" id="username" name="username" required placeholder="Choose a username"
			class="p-2 bg-black rounded-md text-black">

		<label for="password">Password</label>
		<input type="password" id="password" name="password" required placeholder="Create a password"
			autocomplete="off" class="p-2 bg-black rounded-md text-black">

		<button class="btn rounded text-emerald-600 p-2 duration-300 border-0 hover:border hover:border-emerald-400 hover:bg-black bg-transparent w-24 text-left"
			type="submit">Register</button>

		<a hx-get="/loginPage" hx-target="#form-container" hx-swap="outerHTML" hx-push-url="loginPage"
			href="#">
			Already have an account? Login Here...
		</a>
	</form>
</section>
{{ end }}
