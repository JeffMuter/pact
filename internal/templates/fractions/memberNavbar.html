{{ define "memberNavbar" }}

<nav class="navbar flex justify-between bg-gray-900 text-emerald-600">
	<h2>Pact - {{ .Data.Username }}</h2>
	<div class="justify-end gap-4 ">
		{{ if .Data.UserRole }}
		<span class="text-emerald-600">
			{{ if eq .Data.UserRole "worker" }}Worker: {{ end }}{{ .Data.WorkerPoints }} points
		</span>
		{{ end }}
		<a class="btn btn-ghost hover:bg-black rounded duration-300 hover:border-emerald-400"
			href="/buckets" hx-get="/buckets" hx-target="#mainElement" hx-swap="innerHTML" hx-push-url="true">
			Buckets
		</a>
		<a class="btn btn-ghost hover:bg-black rounded duration-300 hover:border-emerald-400"
			href="/rewards" hx-get="/rewards" hx-target="#mainElement" hx-swap="innerHTML" hx-push-url="true">
			Rewards
		</a>
		<a class="btn btn-ghost hover:bg-black rounded duration-300 hover:border-emerald-400"
			href="/history" hx-get="/history" hx-target="#mainElement" hx-swap="innerHTML" hx-push-url="true">
			History
		</a>
		<a class="btn btn-ghost hover:bg-black rounded duration-300 hover:border-emerald-400"
			href="/account" hx-get="/account" hx-target="#mainElement" hx-swap="innerHTML" hx-push-url="true">
			Account
		</a>
		<a class="btn btn-ghost hover:bg-black rounded duration-300 hover:border-emerald-400" href="/logout">
			Logout
		</a>
	</div>
</nav>

{{ end }}
