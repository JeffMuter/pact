{{ define "activeConnection" }}
{{ if .Data.ActiveConnectionId }}
<section class="my-6 p-6 card border border-emerald-400 w-full mx-auto rounded-lg bg-gray-900">
	<h2 class="text-2xl font-bold text-emerald-400 mb-4">Active Connection</h2>
	<div class="bg-black rounded p-4">
		<h3 class="text-lg text-white mb-2">{{ .Data.ActiveUserUsername }}</h3>
		<p class="text-gray-300">Your Role: <span class="text-emerald-400 font-semibold">{{ .Data.ActiveConnectionRole }}</span></p>
	</div>
</section>
{{ end }}
{{ end }}
